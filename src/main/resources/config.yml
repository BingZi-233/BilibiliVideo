# 二维码配置
qrcode:
  # 默认发送模式 (CHAT, ONEBOT)
  default-send-mode: CHAT
  
  # 地图模式设置
  map:
    # 是否启用地图模式
    enabled: true
    # 地图尺寸 (推荐128，Minecraft默认地图大小)
    size: 128
  
  # 聊天框模式设置
  chat:
    # 是否启用聊天框模式
    enabled: true
    # 聊天框二维码显示大小
    display-size: 25

# 登录配置
login:
  # 二维码登录超时时间（分钟）
  qrcode-timeout: 5
  # 状态轮询间隔（秒）
  polling-interval: 3
  # 会话清理间隔（分钟）
  session-cleanup-interval: 10

# 命令建议系统配置
command-suggestion:
  # 缓存TTL（分钟）
  cache-ttl-minutes: 5
  # 最大建议数量
  max-suggestions: 10
  # 响应超时（毫秒）
  response-timeout-ms: 100
  # 是否启用缓存
  cache-enabled: true
  
  # 降级示例数据配置
  fallback-examples:
    # QQ号码示例（格式参考）
    qq-numbers:
      - "1234567890"
      - "9876543210"
      - "1122334455"
    
    # UP主UID示例（知名UP主）
    uploader-uids:
      - "703007996"  # 某知名UP主
      - "546195"     # 某知名UP主
      - "37663924"   # 某知名UP主
    
    # BV号示例（格式参考）
    bv-numbers:
      - "BV1xx411c7mD"
      - "BV1yy411c7mE"
      - "BV1zz411c7mF"

# 三连奖励系统配置
reward:
  # 是否启用奖励系统
  enabled: true
  
  # 每日奖励限制
  daily-limit: 3
  
  # 视频有效天数（新视频定义）
  video-valid-days: 7
  
  # 默认奖励脚本
  default-reward-script: "tell player '恭喜获得三连奖励！'"
  
  # 奖励检查间隔（分钟）
  check-interval: 60
  
  # 是否需要完整三连（点赞+投币+收藏）
  require-full-triple: false
  
  # 最低要求操作（支持：LIKE, COIN, FAVORITE 的组合）
  minimum-actions: 
    - "LIKE"
    - "COIN"