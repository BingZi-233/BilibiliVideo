# 二维码配置
qrcode:
  # 默认发送模式 (CHAT, ONEBOT)
  default-send-mode: CHAT
  
  # 地图模式设置
  map:
    # 是否启用地图模式
    enabled: true
    # 地图尺寸 (推荐128，Minecraft默认地图大小)
    size: 128
  
  # 聊天框模式设置
  chat:
    # 是否启用聊天框模式
    enabled: true
    # 聊天框二维码显示大小
    display-size: 25
  
  # 二维码生成配置
  generation:
    # 颜色配置 (使用ARGB格式的十六进制值)
    colors:
      # 前景色（黑色，用于二维码方块）
      foreground: 0xFF000000
      # 背景色（白色，用于二维码背景）
      background: 0xFFFFFFFF
    
    # 图像处理参数
    image:
      # 默认二维码尺寸（像素）
      default-size: 256
      # 边距大小（模块数量），用于确保二维码完整性
      margin: 2
      # 纠错级别 (L=低, M=中, Q=高, H=最高)
      error-correction: M
      # 字符编码
      character-set: UTF-8
    
    # 尺寸推荐配置
    size-recommendation:
      # 内容长度阈值与对应推荐尺寸
      thresholds:
        # 短内容（<50字符）推荐尺寸
        short-content: 200
        # 中等内容（50-100字符）推荐尺寸
        medium-content: 256
        # 长内容（100-200字符）推荐尺寸
        long-content: 300
        # 超长内容（>200字符）推荐尺寸
        extra-long-content: 400
      # 内容长度边界值
      boundaries:
        # 短内容上限
        short-limit: 50
        # 中等内容上限
        medium-limit: 100
        # 长内容上限
        long-limit: 200

# 登录配置
login:
  # 二维码登录超时时间（分钟）
  qrcode-timeout: 5
  # 状态轮询间隔（秒）
  polling-interval: 3
  # 会话清理间隔（分钟）
  session-cleanup-interval: 10

# 命令建议系统配置
command-suggestion:
  # 缓存TTL（分钟）
  cache-ttl-minutes: 5
  # 最大建议数量
  max-suggestions: 10
  # 响应超时（毫秒）
  response-timeout-ms: 100
  # 是否启用缓存
  cache-enabled: true
  
  # 降级示例数据配置
  fallback-examples:
    # QQ号码示例（格式参考）
    qq-numbers:
      - "1234567890"
      - "9876543210"
      - "1122334455"
    
    # UP主UID示例（知名UP主）
    uploader-uids:
      - "703007996"  # 某知名UP主
      - "546195"     # 某知名UP主
      - "37663924"   # 某知名UP主
    
    # BV号示例（格式参考）
    bv-numbers:
      - "BV1xx411c7mD"
      - "BV1yy411c7mE"
      - "BV1zz411c7mF"

# 三连奖励系统配置
reward:
  # 是否启用奖励系统
  enabled: true
  
  # 每日奖励限制
  daily-limit: 3
  
  # 视频有效天数（新视频定义）
  video-valid-days: 7
  
  # 默认奖励脚本
  default-reward-script: "tell player '恭喜获得三连奖励！'"
  
  # 奖励检查间隔（分钟）
  check-interval: 60
  
  # 是否需要完整三连（点赞+投币+收藏）
  require-full-triple: false
  
  # 最低要求操作（支持：LIKE, COIN, FAVORITE 的组合）
  minimum-actions: 
    - "LIKE"
    - "COIN"