# 二维码配置
qrcode:
  # 默认发送模式 (CHAT, MAP, ONEBOT)
  default-send-mode: CHAT
  
  # 地图模式设置
  map:
    # 是否启用地图模式
    enabled: true
    # 地图尺寸 (推荐128，Minecraft默认地图大小)
    size: 128
  
  # 聊天框模式设置
  chat:
    # 是否启用聊天框模式
    enabled: true
    # 聊天框二维码显示大小
    display-size: 25

# 登录配置
login:
  # 二维码登录超时时间（分钟）
  qrcode-timeout: 5
  # 状态轮询间隔（秒）
  polling-interval: 3
  # 会话清理间隔（分钟）
  session-cleanup-interval: 10